# ═══════════════════════════════════════════════════════════════
#  Deploy L'Espoir asbl · Astro build → FTP upload to Hostinger
# ═══════════════════════════════════════════════════════════════
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   FTP_HOST     · e.g. ftp.lespoir.laconis.be
#   FTP_USER     · Hostinger FTP username
#   FTP_PASSWORD · Hostinger FTP password
#   FTP_DIR      · target dir on server, e.g. "public_html/" or "/"

name: Deploy L'Espoir asbl

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro (Tailwind + static HTML)
        run: npm run build

      - name: Verify dist/ output
        run: |
          ls -la dist/
          test -f dist/index.html
          test -f dist/.htaccess

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_DIR }}
          local-dir: ./dist/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
